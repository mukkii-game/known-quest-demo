<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff8e8">
  <meta name="description" content="セガ30作品またはゲーム英語100問から、知っていた英語を発掘するローカル完結のM0体験プロトタイプ。">
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="data:,">
  <title>KNOWN QUEST — セガ派？ その他派？</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <button class="brand" type="button" data-action="home" aria-label="KNOWN QUEST ホーム">KQ</button>
    <div class="top-actions">
      <button id="sound-toggle" class="sound-toggle" type="button" data-action="toggle-sound" data-testid="sound-toggle" aria-label="音声をオフにする" aria-pressed="true">🔊</button>
      <span class="test-chip">M0 PUBLIC TEST</span>
    </div>
  </header>

  <main id="app" class="app-shell">
    <section id="screen-home" class="screen is-active" aria-labelledby="home-title">
      <div id="route-card" class="route-card" data-testid="route-card">
        <div class="route-mascots" aria-hidden="true">
          <img src="sega-guide-avatar.png" alt="">
          <img src="guide-avatar-v2.png" alt="">
        </div>
        <h1 id="home-title">あなたは<br><span>どっち派？</span></h1>
      </div>
      <div class="route-actions" role="group" aria-label="ゲーム英語ルートを左右から選択">
        <button class="route-button route-sega" type="button" data-route="sega" data-testid="route-sega"><span aria-hidden="true">←</span> セガ派</button>
        <button class="route-button route-other" type="button" data-route="other" data-testid="route-other">その他派 <span aria-hidden="true">→</span></button>
      </div>
    </section>

    <section id="screen-scan" class="screen" aria-labelledby="scan-title" hidden>
      <h2 id="scan-title" class="visually-hidden">ゲーム英語</h2>
      <div class="quiz-progress" aria-label="問題の進み具合">
        <strong><span id="scan-current">1</span><b>/<span id="scan-total">100</span></b></strong>
        <div id="progress-pips" class="progress-pips" aria-hidden="true"></div>
      </div>

      <div class="swipe-shell">
        <article id="scan-card" class="scan-card" aria-live="polite" data-testid="scan-card">
          <div id="swipe-stamp-unknown" class="swipe-stamp swipe-stamp-unknown" aria-hidden="true">知らない</div>
          <div id="swipe-stamp-known" class="swipe-stamp swipe-stamp-known" aria-hidden="true">知ってる</div>
          <div class="card-face">
            <div id="card-badge" class="card-badge" hidden>SEGA MANIA</div>
            <div id="card-katakana" class="card-katakana">セーブ</div>
            <div id="card-english" class="card-english">save</div>
            <div id="card-answer" class="card-answer" aria-live="polite" hidden></div>
            <div id="card-compare" class="card-compare" hidden></div>
          </div>
        </article>
      </div>

      <div class="binary-actions" role="group" aria-label="この言葉を知っているか選択">
        <button id="answer-unknown" type="button" class="answer-button answer-unknown" data-answer="unknown" data-testid="answer-unknown"><span aria-hidden="true">←</span> 知らない</button>
        <button id="answer-known" type="button" class="answer-button answer-known" data-answer="known" data-testid="answer-known">知ってる <span aria-hidden="true">→</span></button>
      </div>
      <button id="undo-answer" class="undo-button" type="button" data-action="undo" data-testid="undo-answer" aria-label="ひとつ前へ戻る" disabled>↶</button>
    </section>

    <section id="screen-result" class="screen result-screen" aria-labelledby="result-title" hidden>
      <div class="result-stage">
        <div class="result-burst" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
        <img class="result-mascot" data-route-avatar src="guide-avatar-v2.png" alt="AI生成の仮ガイドキャラクター">
        <h2 id="result-title">GAME ENGLISH</h2>
        <div class="score"><strong id="result-score">0</strong><span>/100</span></div>
        <div id="result-rank" class="rank-label" aria-live="polite">ゲーム好き</div>
        <button class="primary-button" type="button" data-action="start-networks" data-testid="start-networks">つなぐ</button>
      </div>
    </section>

    <section id="screen-network" class="screen network-screen" aria-labelledby="network-title" hidden>
      <div class="network-head">
        <strong id="network-step">1/10</strong>
        <img data-route-avatar src="guide-avatar-v2.png" alt="AI生成の仮ガイドキャラクター">
      </div>
      <h2 id="network-title">セーブ</h2>
      <div id="network-source-title" class="network-source-title" hidden></div>

      <div class="network-stage">
        <div id="network-link-layer" class="network-link-layer" aria-hidden="true"></div>
        <div id="network-core" class="network-core">
          <strong id="network-core-katakana">セーブ</strong>
          <span id="network-core-english">save</span>
          <b id="network-core-meaning" class="network-meaning" hidden></b>
        </div>
        <div id="network-nodes" class="network-nodes" aria-label="左右どちらへ知識をつなぐか選択"></div>
      </div>

      <div id="network-comparison" class="network-comparison" aria-live="polite" hidden>
        <div class="network-comparison-row is-main">
          <strong><span id="comparison-main-katakana"></span><small id="comparison-main-english"></small></strong>
          <b id="comparison-main-meaning"></b>
        </div>
        <div class="network-comparison-row is-related">
          <strong><span id="comparison-related-katakana"></span><small id="comparison-related-english"></small></strong>
          <b id="comparison-related-meaning"></b>
        </div>
      </div>

      <div id="network-tap-next" class="tap-next" aria-live="polite" hidden>タップでつぎへ</div>
    </section>

    <section id="screen-final" class="screen result-screen" aria-labelledby="final-title" hidden>
      <div class="result-stage">
        <div class="result-burst" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
        <img class="result-mascot" data-route-avatar src="guide-avatar-v2.png" alt="AI生成の仮ガイドキャラクター">
        <h2 id="final-title">GAME ENGLISH</h2>
        <div class="score"><strong id="final-score">0</strong><span>/100</span></div>
        <div id="final-rank" class="rank-label" aria-live="polite">ゲーム好き</div>
        <button class="primary-button" type="button" data-action="restart">もう一度</button>
      </div>
    </section>
  </main>

  <footer class="footer-note">
    <span>送信なし</span><span>AI仮データ / Human未承認</span>
    <span class="visually-hidden">NO DATA UPLOAD</span>
    <span class="visually-hidden">意見収集用・正式教材ではありません</span>
    <span class="visually-hidden">教材・権利ともAIドラフト／Human未承認</span>
    <span class="visually-hidden">AI生成の仮ビジュアル</span>
  </footer>

  <script src="game-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
